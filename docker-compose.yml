services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    image: crud-app:dev
    container_name: crud-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      APP_NAME: Laravel
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: product_drink
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    networks:
      - crud
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: crud-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - crud
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: crud-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"  # host 3307 — avoids conflict with local MySQL on 3306
    environment:
      MYSQL_DATABASE: product_drink
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - crud
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Vite dev server (optional): docker compose --profile dev up
  vite:
    image: node:22-alpine
    container_name: crud-vite
    profiles: ["dev"]
    working_dir: /var/www/html
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
    environment:
      VITE_DEV_SERVER_URL: http://localhost:5173
    networks:
      - crud

  # One-off asset build: docker compose --profile setup run --rm assets
  assets:
    image: node:22-alpine
    profiles: ["setup"]
    working_dir: /var/www/html
    command: sh -c "npm ci && npm run build"
    volumes:
      - ./:/var/www/html

networks:
  crud:
    driver: bridge

volumes:
  mysql-data:
    driver: local
